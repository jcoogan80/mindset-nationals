<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindset Family Feud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #0a0e2e 0%, #0d1f5c 45%, #0a3d7a 100%);
      color: #fff;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ── STATES ── */
    .state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .state.hidden { display: none !important; }

    /* ── SHARED BUTTONS ── */
    button {
      cursor: pointer; border: none; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
      transition: transform .12s, opacity .12s, box-shadow .12s;
    }
    button:hover:not(:disabled) { transform: scale(1.05); }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 22px; height: 22px; vertical-align: middle;
      border: 3px solid rgba(255,255,255,.25); border-top-color: #FFD700;
      border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ══════════════════════════════════════════════════════════
       STATE 1 — TITLE SCREEN
    ══════════════════════════════════════════════════════════ */
    #state-title { gap: 0; }

    #title-logo {
      width: 80px; height: 80px; object-fit: contain; margin-bottom: 14px;
      filter: drop-shadow(0 0 18px rgba(255,215,0,.55));
    }
    #title-brand {
      font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem;
      color: #FFD700; text-shadow: 0 0 24px rgba(255,215,0,.6); line-height: 1;
    }
    #title-heading {
      font-family: 'Bebas Neue', sans-serif; font-size: 5.2rem;
      color: #fff; text-shadow: 0 0 36px rgba(255,215,0,.45); line-height: 1.05; margin-bottom: 14px;
    }
    #title-divider {
      width: 300px; height: 5px;
      background: linear-gradient(90deg, transparent, #e53935, transparent);
      border-radius: 3px; margin: 10px 0 30px;
    }
    #btn-start {
      background: #FFD700; color: #0d1b4b;
      font-size: 1.55rem; padding: 1rem 3.2rem; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(255,215,0,.45);
    }
    #btn-start:hover:not(:disabled) { box-shadow: 0 6px 34px rgba(255,215,0,.7); }
    #title-loading {
      margin-top: 20px; font-size: .92rem; color: rgba(255,255,255,.65);
      min-height: 28px; display: flex; align-items: center;
    }


    /* ══════════════════════════════════════════════════════════
       STATE 2 — TEAM SETUP
    ══════════════════════════════════════════════════════════ */
    #setup-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem;
      color: #fff; margin-bottom: 32px; letter-spacing: 2px;
    }
    #setup-inputs {
      display: flex; gap: 28px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 36px;
    }
    .team-input-wrap { display: flex; flex-direction: column; gap: 8px; }
    .team-input-label { font-size: .9rem; color: rgba(255,255,255,.7); letter-spacing: .5px; }
    .team-input {
      background: #fff; color: #0d1b4b; border: 3px solid transparent;
      border-radius: 8px; font-size: 1.25rem; padding: .75rem 1.2rem;
      font-family: 'DM Sans', sans-serif; font-weight: 700;
      width: 270px; outline: none; transition: border-color .2s;
    }
    .team-input:focus { border-color: #FFD700; }
    #btn-play {
      background: linear-gradient(135deg, #e53935, #b71c1c); color: #fff;
      font-size: 1.7rem; padding: .9rem 3.2rem; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(229,57,53,.5);
    }
    #btn-play:hover { box-shadow: 0 6px 30px rgba(229,57,53,.75); }


    /* ══════════════════════════════════════════════════════════
       STATE 3 — GAME PLAY
    ══════════════════════════════════════════════════════════ */
    #state-game {
      justify-content: flex-start;
      padding: 0; gap: 0;
    }

    /* ── SCOREBAR ── */
    #scorebar {
      width: 100%; height: 74px; flex-shrink: 0;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 20px;
      background: rgba(0,0,0,.45);
      border-bottom: 2px solid rgba(255,215,0,.4);
    }
    .score-side {
      display: flex; flex-direction: column; gap: 0;
    }
    .score-side.right { align-items: flex-end; }
    .score-name {
      font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.7);
      text-transform: uppercase; letter-spacing: 1.2px;
    }
    .score-val {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem;
      color: #FFD700; text-shadow: 0 0 14px rgba(255,215,0,.55); line-height: 1;
      transition: transform .2s;
    }
    .score-val.bump { transform: scale(1.4); }
    .score-center {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    #round-label {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem;
      color: #fff; letter-spacing: 2px;
    }
    #round-pts {
      font-size: .78rem; font-weight: 700; color: #FFD700; letter-spacing: .5px;
    }

    /* ── ACTIVE TEAM GLOW ── */
    .score-side.active-team .score-name {
      color: #FFD700;
      text-shadow: 0 0 8px rgba(255,215,0,.5);
    }
    .score-side.active-team .score-val {
      text-shadow: 0 0 22px rgba(255,215,0,.9);
    }

    /* ── QUESTION AREA ── */
    #question-area {
      width: 100%; flex-shrink: 0;
      padding: 8px 24px; min-height: 58px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.22);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #question-text {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem;
      color: #fff; text-align: center; letter-spacing: 1.5px; line-height: 1.2;
      max-width: 980px;
    }

    /* ── BOARD WRAPPER ── */
    #board-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 10px 20px; overflow: hidden;
    }

    /* ── THE BOARD ── */
    #game-board {
      position: relative;
      width: 100%; max-width: 860px; height: 100%;
      background: linear-gradient(180deg, #0c1650 0%, #0a1240 100%);
      border: 4px solid #FFD700;
      border-radius: 14px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(255,215,0,.18), inset 0 0 40px rgba(0,0,0,.4);
    }

    /* Board title bar */
    #board-title {
      flex-shrink: 0; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,215,0,.12);
      border-bottom: 2px solid rgba(255,215,0,.35);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem;
      color: #FFD700; letter-spacing: 2px;
    }

    /* Answer rows container */
    #answers-list {
      flex: 1; display: flex; flex-direction: column;
      padding: 8px 10px; gap: 5px;
    }

    /* Each answer row */
    .ans-row {
      flex: 1; display: flex; align-items: stretch;
      background: #132466; border: 2px solid rgba(255,215,0,.35);
      border-radius: 7px; overflow: hidden;
      cursor: pointer; transition: background .45s, border-color .45s;
      min-height: 0;
    }
    .ans-row:hover:not(.revealed):not(.empty) {
      background: #1a3080; border-color: rgba(255,215,0,.6);
    }
    .ans-row.revealed {
      background: #1b5e20; border-color: rgba(100,220,100,.45); cursor: default;
    }
    .ans-row.empty {
      background: rgba(255,255,255,.02); border-color: rgba(255,215,0,.1);
      cursor: default; opacity: .45;
    }

    /* Number badge */
    .ans-num {
      width: 52px; min-width: 52px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.3);
      border-right: 2px solid rgba(255,215,0,.3);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: #FFD700;
    }
    .ans-row.revealed .ans-num {
      background: rgba(0,0,0,.2); border-right-color: rgba(100,220,100,.3);
    }

    /* Answer text */
    .ans-text {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 0 10px;
      font-family: 'DM Sans', sans-serif; font-size: clamp(.9rem, 2.2vw, 1.35rem);
      font-weight: 700; color: transparent; text-transform: uppercase; letter-spacing: 1.5px;
      text-align: center; line-height: 1.2;
      transition: color .4s .05s;
    }
    .ans-row.revealed .ans-text { color: #fff; }

    /* Points */
    .ans-pts {
      width: 76px; min-width: 76px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.25);
      border-left: 2px solid rgba(255,215,0,.3);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem;
      color: transparent; transition: color .4s .05s;
    }
    .ans-row.revealed .ans-pts { color: #FFD700; }

    /* ── DOUBLE MODE (Round 2) ── */
    #game-board.double-mode {
      border-color: #FF8C00;
      box-shadow: 0 0 40px rgba(255,140,0,.5), 0 0 80px rgba(255,140,0,.2);
    }
    #game-board.double-mode .ans-row {
      border-color: rgba(255,140,0,.35);
    }
    #game-board.double-mode .ans-row:hover:not(.revealed):not(.empty) {
      background: #2a1800; border-color: rgba(255,140,0,.6);
    }
    #game-board.double-mode .ans-num { color: #FF8C00; }
    #game-board.double-mode .ans-row.revealed .ans-pts { color: #FF8C00; }
    #scorebar.double-mode { border-bottom-color: #FF8C00; }

    /* ── STRIKE OVERLAY ── */
    #strike-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity .15s;
      background: rgba(0,0,0,.55);
    }
    #strike-overlay.show { opacity: 1; }
    #strike-x-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: min(38vw, 260px);
      color: #ff1744;
      text-shadow: 0 0 60px rgba(255,23,68,.9), 0 0 120px rgba(255,23,68,.5);
      line-height: 1; animation: xBounce .15s ease-out;
    }
    @keyframes xBounce {
      0%   { transform: scale(0.4) rotate(-15deg); }
      60%  { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* ── STEAL OVERLAY ── */
    #steal-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity .25s;
      background: rgba(0,0,0,.6);
    }
    #steal-overlay.show { opacity: 1; }
    #steal-text {
      font-family: 'Bebas Neue', sans-serif; font-size: min(18vw, 130px);
      color: #ff9800; letter-spacing: 6px;
      text-shadow: 0 0 40px rgba(255,152,0,.9), 0 0 80px rgba(255,152,0,.5);
      animation: stealPulse .5s ease-in-out infinite alternate;
    }
    @keyframes stealPulse {
      from { text-shadow: 0 0 30px rgba(255,152,0,.7); }
      to   { text-shadow: 0 0 70px rgba(255,152,0,1), 0 0 120px rgba(255,152,0,.6); }
    }

    /* ── CONTROLS ── */
    #controls {
      width: 100%; flex-shrink: 0;
      padding: 8px 14px 10px;
      background: rgba(0,0,0,.5);
      border-top: 2px solid rgba(255,215,0,.3);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }

    /* Strike slots row */
    #strikes-row {
      display: flex; align-items: center; gap: 14px;
    }
    #strikes-label {
      font-size: .7rem; color: rgba(255,255,255,.45);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .strike-slot {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.22);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
      color: transparent; transition: all .2s;
    }
    .strike-slot.filled {
      border-color: #ff1744; color: #ff1744;
      text-shadow: 0 0 8px rgba(255,23,68,.7);
      animation: slotIn .3s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes slotIn {
      0%   { transform: scale(0) rotate(-45deg); opacity: 0; }
      65%  { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    /* Button row */
    #ctrl-buttons {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .ctrl-btn {
      font-size: .98rem; padding: .48rem 1rem; border-radius: 7px;
      white-space: nowrap;
    }
    #btn-reveal-next { background: #1976d2; color: #fff; }
    #btn-strike      { background: #c62828; color: #fff; }
    #btn-strike.steal-mode {
      background: #e65100; color: #fff;
      animation: stealFlash .55s ease-in-out infinite alternate;
    }
    @keyframes stealFlash {
      from { box-shadow: 0 0 0 rgba(230,81,0,0); }
      to   { box-shadow: 0 0 18px 5px rgba(230,81,0,.85); }
    }
    #btn-award-t1  { background: #1565c0; color: #fff; }
    #btn-award-t2  { background: #1565c0; color: #fff; }
    #btn-reveal-all{ background: #37474f; color: rgba(255,255,255,.85); }
    #btn-next      { background: #455a64; color: #fff; }


    /* ══════════════════════════════════════════════════════════
       STATE 4 — FINAL SCREEN
    ══════════════════════════════════════════════════════════ */
    #state-final { gap: 0; overflow: hidden; }

    #final-heading {
      font-family: 'Bebas Neue', sans-serif; font-size: 4.2rem;
      color: #FFD700; text-shadow: 0 0 40px rgba(255,215,0,.8);
      margin-bottom: 26px;
      animation: pulseGold 1.4s ease-in-out infinite alternate;
    }
    @keyframes pulseGold {
      from { text-shadow: 0 0 20px rgba(255,215,0,.5); }
      to   { text-shadow: 0 0 60px rgba(255,215,0,1); }
    }

    #final-scores {
      display: flex; gap: 64px; align-items: center; margin-bottom: 28px;
    }
    .final-team-block { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .final-team-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem;
      color: rgba(255,255,255,.9); letter-spacing: 2px;
    }
    .final-team-score {
      font-family: 'Bebas Neue', sans-serif; font-size: 6.5rem;
      line-height: 1; color: #FFD700; text-shadow: 0 0 24px rgba(255,215,0,.65);
    }
    .final-vs {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(255,255,255,.35);
    }
    #final-winner {
      font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem;
      color: #FFD700; letter-spacing: 3px; margin-bottom: 36px;
      text-shadow: 0 0 40px rgba(255,215,0,.9);
      animation: pulseGold 1s ease-in-out infinite alternate;
    }
    #btn-again {
      background: linear-gradient(135deg, #FFD700, #ff9800); color: #0d1b4b;
      font-size: 1.55rem; padding: .9rem 2.8rem; border-radius: 12px;
      box-shadow: 0 4px 22px rgba(255,215,0,.45); z-index: 10;
    }

    /* ══ 2X DOUBLE BADGE (scorebar) ══ */
    #double-badge {
      font-family: 'Bebas Neue', sans-serif; font-size: .82rem; letter-spacing: 1.5px;
      color: #FF8C00; background: rgba(255,140,0,.15);
      border: 1px solid rgba(255,140,0,.55); border-radius: 4px;
      padding: 1px 7px;
      animation: badgePulse .8s ease-in-out infinite alternate;
    }
    #double-badge.hidden { display: none; }
    @keyframes badgePulse {
      from { opacity: .65; }
      to   { opacity: 1; box-shadow: 0 0 9px rgba(255,140,0,.55); }
    }

    /* ══ DOUBLE POINTS TRANSITION SCREEN ══ */
    #state-double {
      background: radial-gradient(ellipse at 50% 40%, #2a0d00 0%, #0d0400 55%, #000 100%);
      z-index: 50;
    }
    #double-content {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      animation: doubleIn .65s cubic-bezier(.2, 1.35, .5, 1) both;
    }
    @keyframes doubleIn {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .double-lightning {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      animation: lightFlash .35s ease-in-out infinite alternate;
    }
    @keyframes lightFlash {
      from { opacity: .5; transform: scale(.9) rotate(-5deg); }
      to   { opacity: 1;  transform: scale(1.15) rotate(5deg); }
    }
    #double-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 17vw, 11rem);
      line-height: .92; text-align: center; color: #FFD700;
      text-shadow: 0 0 40px rgba(255,215,0,.9), 0 0 80px rgba(255,120,0,.6);
      animation: doubleGlow 1s ease-in-out infinite alternate;
    }
    @keyframes doubleGlow {
      from { text-shadow: 0 0 30px rgba(255,215,0,.7), 0 0 60px rgba(255,100,0,.4); }
      to   { text-shadow: 0 0 70px rgba(255,215,0,1), 0 0 110px rgba(255,100,0,.7), 0 0 150px rgba(220,30,0,.4); }
    }
    #double-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.45rem); font-weight: 700;
      color: #fff; letter-spacing: .5px; text-align: center;
    }
    #double-values {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      color: #FF8C00; letter-spacing: 3px;
      text-shadow: 0 0 22px rgba(255,140,0,.8);
      animation: doubleGlow 1s ease-in-out infinite alternate;
    }
    #btn-double-continue {
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      color: #0d1b4b; font-size: 1.6rem;
      padding: .9rem 3rem; border-radius: 12px; margin-top: 8px;
      box-shadow: 0 4px 24px rgba(255,180,0,.45);
    }
    #btn-double-continue:hover { box-shadow: 0 6px 36px rgba(255,180,0,.75); }

    /* Confetti */
    #confetti-container {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden;
    }
    .confetto {
      position: absolute; top: -20px;
      width: 10px; height: 14px; border-radius: 2px; opacity: .9;
      animation: confettoFall linear forwards;
    }
    @keyframes confettoFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: .9; }
      80%  { opacity: .9; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     STATE 1 — TITLE
══════════════════════════════════════════════════════════ -->
<div id="state-title" class="state">
  <img id="title-logo" src="images/mindset-logo.png" alt="Mindset" onerror="this.style.display='none'" />
  <p id="title-brand">MINDSET</p>
  <p id="title-heading">FAMILY FEUD 🏐</p>
  <div id="title-divider"></div>
  <button id="btn-start">START GAME</button>
  <div id="title-loading"></div>
</div>

<!-- ══════════════════════════════════════════════════════════
     STATE 2 — TEAM SETUP
══════════════════════════════════════════════════════════ -->
<div id="state-setup" class="state hidden">
  <p id="setup-title">Enter Team Names</p>
  <div id="setup-inputs">
    <div class="team-input-wrap">
      <label class="team-input-label">🔴 Team 1 Name</label>
      <input id="input-team1" class="team-input" type="text" placeholder="Team 1" maxlength="22" />
    </div>
    <div class="team-input-wrap">
      <label class="team-input-label">🔵 Team 2 Name</label>
      <input id="input-team2" class="team-input" type="text" placeholder="Team 2" maxlength="22" />
    </div>
  </div>
  <button id="btn-play">LET'S PLAY!</button>
</div>

<!-- ══════════════════════════════════════════════════════════
     STATE 3 — GAME
══════════════════════════════════════════════════════════ -->
<div id="state-game" class="state hidden">

  <!-- SCOREBAR -->
  <div id="scorebar">
    <div class="score-side left" id="score-left">
      <div class="score-name" id="t1-name">Team 1</div>
      <div class="score-val" id="t1-score">0</div>
    </div>
    <div class="score-center">
      <div id="round-label">ROUND 1 OF 1</div>
      <div id="double-badge" class="hidden">⚡ 2X DOUBLE ⚡</div>
      <div id="round-pts">0 PTS REVEALED</div>
    </div>
    <div class="score-side right" id="score-right">
      <div class="score-name" id="t2-name">Team 2</div>
      <div class="score-val" id="t2-score">0</div>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="question-area">
    <div id="question-text">Loading...</div>
  </div>

  <!-- THE BOARD -->
  <div id="board-wrap">
    <div id="game-board">
      <div id="board-title">SURVEY SAYS...</div>
      <div id="answers-list"></div>

      <!-- Strike overlay — appears on the board -->
      <div id="strike-overlay">
        <span id="strike-x-mark">✕</span>
      </div>

      <!-- Steal overlay -->
      <div id="steal-overlay">
        <span id="steal-text">STEAL!</span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controls">
    <div id="strikes-row">
      <span id="strikes-label">Strikes:</span>
      <div class="strike-slot" id="strike-slot-0"></div>
      <div class="strike-slot" id="strike-slot-1"></div>
      <div class="strike-slot" id="strike-slot-2"></div>
    </div>
    <div id="ctrl-buttons">
      <button id="btn-reveal-next" class="ctrl-btn">▶ REVEAL NEXT</button>
      <button id="btn-strike"      class="ctrl-btn">✕ STRIKE</button>
      <button id="btn-award-t1"    class="ctrl-btn">🏆 +PTS → <span id="ctrl-t1">Team 1</span></button>
      <button id="btn-award-t2"    class="ctrl-btn">🏆 +PTS → <span id="ctrl-t2">Team 2</span></button>
      <button id="btn-reveal-all"  class="ctrl-btn">🔓 REVEAL ALL</button>
      <button id="btn-next"        class="ctrl-btn">NEXT ROUND ➡</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     STATE: DOUBLE POINTS TRANSITION
══════════════════════════════════════════════════════════ -->
<div id="state-double" class="state hidden">
  <div id="double-content">
    <div class="double-lightning">⚡</div>
    <div id="double-headline">DOUBLE<br>POINTS</div>
    <div class="double-lightning">⚡</div>
    <div id="double-subtitle">All point values are now DOUBLED!</div>
    <div id="double-values">50 &nbsp;·&nbsp; 40 &nbsp;·&nbsp; 30 &nbsp;·&nbsp; 20 &nbsp;·&nbsp; 10</div>
    <button id="btn-double-continue">CONTINUE →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     STATE 4 — FINAL
══════════════════════════════════════════════════════════ -->
<div id="state-final" class="state hidden">
  <div id="confetti-container"></div>
  <p id="final-heading">🎉 GAME OVER! 🎉</p>
  <div id="final-scores">
    <div class="final-team-block">
      <span id="final-t1-name" class="final-team-name">Team 1</span>
      <span id="final-t1-score" class="final-team-score">0</span>
    </div>
    <span class="final-vs">VS</span>
    <div class="final-team-block">
      <span id="final-t2-name" class="final-team-name">Team 2</span>
      <span id="final-t2-score" class="final-team-score">0</span>
    </div>
  </div>
  <p id="final-winner"></p>
  <button id="btn-again">🔄 PLAY AGAIN</button>
</div>

<script>
(function () {
  'use strict';

  /* ────────────────────────────────────────────────────────────
     AUDIO
  ──────────────────────────────────────────────────────────── */
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playReveal() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      [880, 1100, 1320].forEach((freq, i) => {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = now + i * 0.1;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.38, t + 0.03);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        osc.start(t); osc.stop(t + 0.25);
      });
    } catch(e) {}
  }

  function playStrike() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      // Noise burst
      const bufSize = audioCtx.sampleRate * 0.28;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * 0.55;
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const filt = audioCtx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 280;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
      src.start(now); src.stop(now + 0.32);
      // Sawtooth buzz
      const osc = audioCtx.createOscillator(), og = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = 110;
      og.gain.setValueAtTime(0.45, now); og.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      osc.connect(og); og.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.32);
    } catch(e) {}
  }

  function playRoundWin() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = 'triangle'; osc.frequency.value = freq;
        const t = now + i * 0.14;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.42, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.start(t); osc.stop(t + 0.34);
      });
    } catch(e) {}
  }

  function playDoubleFanfare() {
    try {
      ensureAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      // Bass thump
      const bass = ctx.createOscillator(), bassG = ctx.createGain();
      bass.type = 'sine'; bass.frequency.value = 80;
      bass.connect(bassG); bassG.connect(ctx.destination);
      bassG.gain.setValueAtTime(0, now);
      bassG.gain.linearRampToValueAtTime(0.7, now + 0.05);
      bassG.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      bass.start(now); bass.stop(now + 0.6);
      // Ascending dramatic fanfare
      const notes = [220, 277, 330, 415, 523, 622, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = i < 4 ? 'square' : 'triangle';
        osc.frequency.value = freq;
        osc.connect(g); g.connect(ctx.destination);
        const t = now + i * 0.13;
        const dur = i === notes.length - 1 ? 0.9 : 0.22;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.05);
      });
    } catch(e) {}
  }

  function playFanfare() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = now + i * 0.22;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.45, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        osc.start(t); osc.stop(t + 0.6);
      });
    } catch(e) {}
  }

  /* ────────────────────────────────────────────────────────────
     STATE MACHINE
  ──────────────────────────────────────────────────────────── */
  const ALL_STATES = ['state-title','state-setup','state-game','state-double','state-final'];
  function goToState(id) {
    ALL_STATES.forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id));
  }

  /* ────────────────────────────────────────────────────────────
     GAME STATE
  ──────────────────────────────────────────────────────────── */
  let questions    = [];
  let currentRound = 0;
  let strikes      = 0;
  let roundPoints  = 0;
  let scores       = { t1: 0, t2: 0 };
  let team1name    = 'Team 1';
  let team2name    = 'Team 2';
  let revealedState= [];   // [round][answerIdx] = boolean
  let activeTeam   = null; // 't1' or 't2'

  // Rounds 1-2 (index 0-1): normal points. Round 3+ (index 2+): double points.
  function getMultiplier() { return currentRound >= 2 ? 2 : 1; }

  /* ────────────────────────────────────────────────────────────
     DATA LOADING
  ──────────────────────────────────────────────────────────── */
  async function loadGameData() {
    const el = document.getElementById('title-loading');
    el.innerHTML = '<span class="spinner"></span> Loading game data...';
    try {
      // Fetch the static file directly — no GitHub API, no rate limits, no base64
      const res = await fetch('/feud-data.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const gd = data.gameData || data;
      questions = (gd.questions || []).filter(q => q.active !== false);
      if (!questions.length) throw new Error('No active questions in gameData');
      revealedState = questions.map(q => q.answers.map(() => false));
      el.innerHTML = `✅ ${questions.length} questions loaded!`;
    } catch(err) {
      console.warn('Using demo data:', err.message);
      el.innerHTML = '⚠️ Using demo data';
      useDemoData();
    }
    document.getElementById('btn-start').disabled = false;
  }

  function useDemoData() {
    questions = [
      {
        id:'q1', question:'Name something you always forget to pack for a volleyball tournament',
        answers:[
          {text:'Knee Pads',points:25},{text:'Water Bottle',points:20},
          {text:'Charger',points:15},{text:'Shoes',points:10},{text:'Socks',points:5}
        ], active:true
      },
      {
        id:'q2', question:'Name something coaches always say during a timeout',
        answers:[
          {text:"Let's Go!",points:25},{text:'Move Your Feet',points:20},
          {text:'Talk To Each Other',points:15},{text:'Serve Tough',points:10},{text:'Have Fun',points:5}
        ], active:true
      },
      {
        id:'q3', question:"Name something you'd find in a volleyball player's bag",
        answers:[
          {text:'Knee Pads',points:25},{text:'Water Bottle',points:20},
          {text:'Hair Ties',points:15},{text:'Spandex',points:10},{text:'Phone',points:5}
        ], active:true
      }
    ];
    revealedState = questions.map(q => q.answers.map(() => false));
  }

  /* ────────────────────────────────────────────────────────────
     RENDER BOARD — TV-style vertical rows
  ──────────────────────────────────────────────────────────── */
  function renderBoard() {
    const q    = questions[currentRound];
    const list = document.getElementById('answers-list');
    list.innerHTML = '';

    const displaySlots = 5; // always exactly 5 slots

    for (let i = 0; i < displaySlots; i++) {
      const row = document.createElement('div');
      row.className = 'ans-row';
      row.dataset.idx = i;

      if (i >= q.answers.length) {
        // empty slot
        row.classList.add('empty');
        row.innerHTML = `
          <div class="ans-num">${i + 1}</div>
          <div class="ans-text"></div>
          <div class="ans-pts"></div>`;
        list.appendChild(row);
        continue;
      }

      const ans = q.answers[i];
      if (revealedState[currentRound][i]) row.classList.add('revealed');

      row.innerHTML = `
        <div class="ans-num">${i + 1}</div>
        <div class="ans-text">${escHtml(ans.text)}</div>
        <div class="ans-pts">${ans.points * getMultiplier()}</div>`;

      // Click row to reveal
      row.addEventListener('click', () => {
        if (!row.classList.contains('revealed')) revealAnswer(i);
      });

      list.appendChild(row);
    }

    updateBoardTitle();
  }

  function updateBoardTitle() {
    const q = questions[currentRound];
    const mult = getMultiplier();
    const totalPts = q.answers.reduce((s, a) => s + (a.points || 0), 0) * mult;
    const doubleTag = mult > 1 ? '  ·  ×2 DOUBLE' : '';
    document.getElementById('board-title').textContent =
      `ROUND ${currentRound + 1}${doubleTag}  ·  ${totalPts} POINTS ON THE BOARD`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ────────────────────────────────────────────────────────────
     ROUND MANAGEMENT
  ──────────────────────────────────────────────────────────── */
  function startRound(idx) {
    currentRound = idx;
    strikes = 0;
    roundPoints = 0;
    activeTeam = null;

    // Toggle double-mode styling when in Round 2
    const isDouble = getMultiplier() > 1;
    document.getElementById('game-board').classList.toggle('double-mode', isDouble);
    const scorebar = document.getElementById('scorebar');
    if (scorebar) scorebar.classList.toggle('double-mode', isDouble);

    updateStrikeSlots();
    updateRoundInfo();
    clearActiveTeam();

    const btn = document.getElementById('btn-strike');
    btn.disabled = false;
    btn.classList.remove('steal-mode');
    btn.textContent = '✕ STRIKE';

    document.getElementById('steal-overlay').classList.remove('show');

    document.getElementById('question-text').textContent = questions[currentRound].question;
    renderBoard();
    updateRoundPtsDisplay();
  }

  /* ────────────────────────────────────────────────────────────
     REVEAL LOGIC
  ──────────────────────────────────────────────────────────── */
  function revealAnswer(ansIdx) {
    if (revealedState[currentRound][ansIdx]) return;
    revealedState[currentRound][ansIdx] = true;

    const pts = (questions[currentRound].answers[ansIdx].points || 0) * getMultiplier();
    roundPoints += pts;
    updateRoundPtsDisplay();

    const row = document.querySelector(`.ans-row[data-idx="${ansIdx}"]`);
    if (row) row.classList.add('revealed');

    playReveal();
    if (allRevealed()) setTimeout(playRoundWin, 300);
  }

  function revealNext() {
    const q = questions[currentRound];
    for (let i = 0; i < q.answers.length; i++) {
      if (!revealedState[currentRound][i]) { revealAnswer(i); return; }
    }
  }

  function revealAll() {
    const q = questions[currentRound];
    q.answers.forEach((_, i) => {
      if (!revealedState[currentRound][i]) {
        setTimeout(() => revealAnswer(i), i * 140);
      }
    });
  }

  function allRevealed() {
    const q = questions[currentRound];
    return revealedState[currentRound].every((v, i) => v || i >= q.answers.length);
  }

  /* ────────────────────────────────────────────────────────────
     STRIKE
  ──────────────────────────────────────────────────────────── */
  function addStrike() {
    if (strikes >= 3) return;
    strikes++;
    updateStrikeSlots();
    playStrike();

    // Show big X overlay on board for 1.5s
    const overlay = document.getElementById('strike-overlay');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1500);

    if (strikes >= 3) {
      setTimeout(() => {
        const btn = document.getElementById('btn-strike');
        btn.textContent = '🔥 STEAL!';
        btn.classList.add('steal-mode');
        btn.disabled = true;
        document.getElementById('steal-overlay').classList.add('show');
      }, 1600);
    }
  }

  function updateStrikeSlots() {
    for (let i = 0; i < 3; i++) {
      const slot = document.getElementById(`strike-slot-${i}`);
      if (i < strikes) {
        slot.textContent = '✕';
        slot.classList.add('filled');
        // re-trigger animation
        slot.style.animation = 'none';
        void slot.offsetWidth;
        slot.style.animation = '';
      } else {
        slot.textContent = '';
        slot.classList.remove('filled');
      }
    }
  }

  /* ────────────────────────────────────────────────────────────
     AWARD POINTS
  ──────────────────────────────────────────────────────────── */
  function awardPoints(team) {
    if (team === 't1') {
      scores.t1 += roundPoints;
      bumpScore('t1-score');
      setActiveTeam('t1');
    } else {
      scores.t2 += roundPoints;
      bumpScore('t2-score');
      setActiveTeam('t2');
    }
    roundPoints = 0;
    updateScoreDisplay();
    updateRoundPtsDisplay();
    playRoundWin();
    document.getElementById('steal-overlay').classList.remove('show');
  }

  function bumpScore(id) {
    const el = document.getElementById(id);
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 280);
  }

  function setActiveTeam(team) {
    activeTeam = team;
    document.getElementById('score-left').classList.toggle('active-team', team === 't1');
    document.getElementById('score-right').classList.toggle('active-team', team === 't2');
  }

  function clearActiveTeam() {
    document.getElementById('score-left').classList.remove('active-team');
    document.getElementById('score-right').classList.remove('active-team');
  }

  /* ────────────────────────────────────────────────────────────
     NEXT ROUND / FINAL
  ──────────────────────────────────────────────────────────── */
  function nextRound() {
    const nextIdx = currentRound + 1;
    if (nextIdx >= questions.length) {
      showFinal();
    } else if (nextIdx === 2) {
      // Transition to double points before starting round 3
      showDoublePointsScreen(nextIdx);
    } else {
      startRound(nextIdx);
    }
  }

  function showDoublePointsScreen(nextIdx) {
    goToState('state-double');
    playDoubleFanfare();
    document.getElementById('btn-double-continue').onclick = () => {
      startRound(nextIdx);
    };
  }

  function showFinal() {
    document.getElementById('final-t1-name').textContent  = team1name;
    document.getElementById('final-t2-name').textContent  = team2name;
    document.getElementById('final-t1-score').textContent = scores.t1;
    document.getElementById('final-t2-score').textContent = scores.t2;
    let w = '';
    if (scores.t1 > scores.t2)      w = `🏆 ${team1name} WINS!`;
    else if (scores.t2 > scores.t1) w = `🏆 ${team2name} WINS!`;
    else                             w = "🤝 IT'S A TIE!";
    document.getElementById('final-winner').textContent = w;
    goToState('state-final');
    playFanfare();
    launchConfetti();
  }

  /* ────────────────────────────────────────────────────────────
     DISPLAY HELPERS
  ──────────────────────────────────────────────────────────── */
  function updateScoreDisplay() {
    document.getElementById('t1-score').textContent = scores.t1;
    document.getElementById('t2-score').textContent = scores.t2;
  }

  function updateRoundInfo() {
    document.getElementById('round-label').textContent =
      `ROUND ${currentRound + 1} OF ${questions.length}`;
    const badge = document.getElementById('double-badge');
    if (badge) badge.classList.toggle('hidden', getMultiplier() === 1);
    updateRoundPtsDisplay();
  }

  function updateRoundPtsDisplay() {
    document.getElementById('round-pts').textContent =
      roundPoints > 0 ? `${roundPoints} PTS REVEALED` : 'SURVEY SAYS...';
  }

  function updateTeamLabels() {
    document.getElementById('t1-name').textContent    = team1name;
    document.getElementById('t2-name').textContent    = team2name;
    document.getElementById('ctrl-t1').textContent    = team1name;
    document.getElementById('ctrl-t2').textContent    = team2name;
  }

  /* ────────────────────────────────────────────────────────────
     CONFETTI
  ──────────────────────────────────────────────────────────── */
  function launchConfetti() {
    const c = document.getElementById('confetti-container');
    c.innerHTML = '';
    const colors = ['#FFD700','#e53935','#1565c0','#fff','#66bb6a','#ff9800','#ab47bc'];
    for (let i = 0; i < 130; i++) {
      const el = document.createElement('div');
      el.className = 'confetto';
      el.style.left              = Math.random() * 100 + 'vw';
      el.style.width             = (7 + Math.random() * 8) + 'px';
      el.style.height            = (10 + Math.random() * 10) + 'px';
      el.style.background        = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      el.style.animationDelay    = (Math.random() * 2) + 's';
      el.style.borderRadius      = Math.random() > 0.5 ? '50%' : '2px';
      c.appendChild(el);
    }
  }

  /* ────────────────────────────────────────────────────────────
     WIRE UP BUTTONS
  ──────────────────────────────────────────────────────────── */
  document.getElementById('btn-start').disabled = true;

  document.getElementById('btn-start').addEventListener('click', () => {
    ensureAudio();
    goToState('state-setup');
    document.getElementById('input-team1').focus();
  });

  document.getElementById('btn-play').addEventListener('click', () => {
    ensureAudio();
    team1name = document.getElementById('input-team1').value.trim() || 'Team 1';
    team2name = document.getElementById('input-team2').value.trim() || 'Team 2';
    scores = { t1: 0, t2: 0 };
    revealedState = questions.map(q => q.answers.map(() => false));
    updateTeamLabels();
    updateScoreDisplay();
    goToState('state-game');
    startRound(0);
  });

  document.getElementById('btn-reveal-next').addEventListener('click', () => { ensureAudio(); revealNext(); });
  document.getElementById('btn-strike').addEventListener('click',       () => { ensureAudio(); addStrike(); });
  document.getElementById('btn-reveal-all').addEventListener('click',   () => { ensureAudio(); revealAll(); });
  document.getElementById('btn-next').addEventListener('click',         () => { ensureAudio(); nextRound(); });
  document.getElementById('btn-award-t1').addEventListener('click',     () => { ensureAudio(); awardPoints('t1'); });
  document.getElementById('btn-award-t2').addEventListener('click',     () => { ensureAudio(); awardPoints('t2'); });
  document.getElementById('btn-again').addEventListener('click',        () => { window.location.reload(); });

  ['input-team1','input-team2'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-play').click();
    });
  });

  /* ────────────────────────────────────────────────────────────
     KEYBOARD SHORTCUTS (game state only)
  ──────────────────────────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (document.getElementById('state-game').classList.contains('hidden')) return;
    const q = questions[currentRound];
    if (!q) return;

    // 1–8 → reveal that answer
    const num = parseInt(e.key, 10);
    if (!e.altKey && num >= 1 && num <= 8 && num <= q.answers.length) {
      revealAnswer(num - 1); return;
    }

    if (e.altKey) {
      if (e.key === '1') { awardPoints('t1'); return; }
      if (e.key === '2') { awardPoints('t2'); return; }
    }

    switch (e.key.toLowerCase()) {
      case 's': addStrike();  break;
      case 'r': revealAll();  break;
      case 'n': nextRound();  break;
      case ' ': e.preventDefault(); revealNext(); break;
    }
  });

  /* ────────────────────────────────────────────────────────────
     INIT
  ──────────────────────────────────────────────────────────── */
  loadGameData();
})();
</script>
</body>
</html>
