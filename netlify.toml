[build]
  functions = "netlify/functions"
  publish = "."

[build.processing.html]
  pretty_urls = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/api/gallery-images"
  to = "/.netlify/functions/gallery-images"
  status = 200

[[redirects]]
  from = "/api/gallery-upload-url"
  to = "/.netlify/functions/gallery-upload-url"
  status = 200

[[redirects]]
  from = "/api/validate-password"
  to = "/.netlify/functions/validate-password"
  status = 200
